name: Project Automation

# Keeps the "Lernza Roadmap" project board in sync with issue/PR lifecycle.
# The board tracks ISSUES only — PRs are never added to the board.
# PRs move their linked issues through statuses via this workflow.
#
# ┌─────────────────────────────────────────────────────────────────────┐
# │  Built-in project workflows (configured in project settings UI):   │
# │                                                                    │
# │  ✅ Auto-add to project    filter: is:issue is:open                │
# │  ✅ Item added to project  issue only → Backlog                    │
# │  ✅ Item closed            issue only → Done                       │
# │  ✅ Item reopened          issue only → Todo                       │
# │  ✅ Auto-close issue       when status = Done → closes issue       │
# │  ❌ PR linked to issue     OFF (linking ≠ ready for review)        │
# │  ❌ PR merged              OFF (operates on PR, not linked issue)  │
# │  ❌ Code changes requested OFF (operates on PR, not linked issue)  │
# │  ❌ Code review approved   OFF (operates on PR, not linked issue)  │
# │                                                                    │
# │  This Actions workflow handles everything the built-ins can't:     │
# │                                                                    │
# │  Issue assigned            → In Progress (if not already further)  │
# │  Issue unassigned (none)   → Todo (only from In Progress)          │
# │  Issue closed not_planned  → Invalid (overrides built-in Done)     │
# │  Review requested on PR    → linked issues to In Review            │
# │  Changes requested review  → linked issues to In Progress          │
# │  PR closed without merge   → In Progress/Todo (if no other PRs)   │
# │                                                                    │
# │  PR merged → Done is handled by the indirect chain:                │
# │  merge → GitHub auto-closes linked issue → built-in Item closed    │
# └─────────────────────────────────────────────────────────────────────┘

on:
  issues:
    types: [assigned, unassigned, closed]
  # Use pull_request_target (not pull_request) so fork PRs have access
  # to PROJECT_TOKEN. Safe because we never checkout PR code.
  pull_request_target:
    types: [closed, review_requested]
  pull_request_review:
    types: [submitted]

env:
  GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
  PROJECT_OWNER: lernza
  PROJECT_NUMBER: "1"
  STATUS_FIELD_ID: "PVTSSF_lADOC20SDc4BRpIZzg_aUc4"
  PROJECT_ID: "PVT_kwDOC20SDc4BRpIZ"
  STATUS_BACKLOG: "11dd4cec"
  STATUS_TODO: "fb5b0bc3"
  STATUS_IN_PROGRESS: "8b6279b2"
  STATUS_IN_REVIEW: "b3cfa0b7"
  STATUS_DONE: "98fbbd58"
  STATUS_INVALID: "bf0b7b0b"

jobs:
  # ─── Issue assigned → In Progress ──────────────────────────────
  # Only moves if issue is in Backlog or Todo. Does NOT yank issues
  # backwards from In Review, Done, or Invalid.
  issue-assigned:
    if: github.event_name == 'issues' && github.event.action == 'assigned'
    runs-on: ubuntu-latest
    steps:
      - name: Move to In Progress if in Backlog or Todo
        run: |
          # Ensure issue is in project
          ITEM_ID=$(gh project item-add $PROJECT_NUMBER \
            --owner $PROJECT_OWNER \
            --url "${{ github.event.issue.html_url }}" \
            --format json | jq -r '.id')

          # Check current status — only advance forward, never backward
          CURRENT_STATUS=$(gh project item-list $PROJECT_NUMBER \
            --owner $PROJECT_OWNER --limit 200 --format json | \
            jq -r --arg N "${{ github.event.issue.number }}" \
            '.items[] | select(.content.number == ($N|tonumber)) | .status')

          if [ "$CURRENT_STATUS" = "Backlog" ] || \
             [ "$CURRENT_STATUS" = "Todo" ] || \
             [ "$CURRENT_STATUS" = "" ] || \
             [ "$CURRENT_STATUS" = "null" ]; then

            gh api graphql -f query="
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: \"$PROJECT_ID\"
                  itemId: \"$ITEM_ID\"
                  fieldId: \"$STATUS_FIELD_ID\"
                  value: { singleSelectOptionId: \"$STATUS_IN_PROGRESS\" }
                }) { projectV2Item { id } }
              }"

            echo "Moved #${{ github.event.issue.number }} to In Progress (was: $CURRENT_STATUS)"
          else
            echo "Skipped — issue #${{ github.event.issue.number }} is already $CURRENT_STATUS"
          fi

  # ─── Issue unassigned → Todo (if no assignees left) ────────────
  # Only moves from In Progress. Does NOT move issues that are
  # In Review (PR still open), Done, or Invalid.
  issue-unassigned:
    if: github.event_name == 'issues' && github.event.action == 'unassigned'
    runs-on: ubuntu-latest
    steps:
      - name: Move back to Todo if no assignees and currently In Progress
        run: |
          ASSIGNEE_COUNT=$(gh issue view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} --json assignees -q '.assignees | length')

          if [ "$ASSIGNEE_COUNT" -gt 0 ]; then
            echo "Issue still has $ASSIGNEE_COUNT assignee(s), no change"
            exit 0
          fi

          # Get item ID and current status
          ITEM_DATA=$(gh project item-list $PROJECT_NUMBER \
            --owner $PROJECT_OWNER --limit 200 --format json | \
            jq -r --arg N "${{ github.event.issue.number }}" \
            '.items[] | select(.content.number == ($N|tonumber)) | "\(.id) \(.status)"')

          ITEM_ID=$(echo "$ITEM_DATA" | awk '{print $1}')
          CURRENT_STATUS=$(echo "$ITEM_DATA" | awk '{$1=""; print $0}' | xargs)

          if [ -z "$ITEM_ID" ] || [ "$ITEM_ID" = "null" ]; then
            echo "Issue not in project, skipping"
            exit 0
          fi

          # Only move back to Todo from In Progress
          if [ "$CURRENT_STATUS" = "In Progress" ]; then
            gh api graphql -f query="
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: \"$PROJECT_ID\"
                  itemId: \"$ITEM_ID\"
                  fieldId: \"$STATUS_FIELD_ID\"
                  value: { singleSelectOptionId: \"$STATUS_TODO\" }
                }) { projectV2Item { id } }
              }"

            echo "Moved #${{ github.event.issue.number }} back to Todo (no assignees)"
          else
            echo "Skipped — issue is $CURRENT_STATUS, not In Progress"
          fi

  # ─── Issue closed as "not planned" → Invalid ───────────────────
  # The built-in "Item closed" sets Done for all closes.
  # This overrides that for issues closed as "not planned".
  issue-closed-not-planned:
    if: >-
      github.event_name == 'issues' &&
      github.event.action == 'closed' &&
      github.event.issue.state_reason == 'not_planned'
    runs-on: ubuntu-latest
    steps:
      - name: Override to Invalid
        run: |
          # The Actions runner startup (~15-30s) already provides enough
          # delay for the built-in "Item closed → Done" to fire first.
          # Small extra buffer just in case.
          sleep 3

          ITEM_ID=$(gh project item-list $PROJECT_NUMBER \
            --owner $PROJECT_OWNER --limit 200 --format json | \
            jq -r --arg N "${{ github.event.issue.number }}" \
            '.items[] | select(.content.number == ($N|tonumber)) | .id')

          if [ -n "$ITEM_ID" ] && [ "$ITEM_ID" != "null" ]; then
            gh api graphql -f query="
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: \"$PROJECT_ID\"
                  itemId: \"$ITEM_ID\"
                  fieldId: \"$STATUS_FIELD_ID\"
                  value: { singleSelectOptionId: \"$STATUS_INVALID\" }
                }) { projectV2Item { id } }
              }"

            echo "Moved #${{ github.event.issue.number }} to Invalid (closed as not planned)"
          fi

  # ─── Review requested on PR → linked issues to In Review ──────
  # Fires when a contributor clicks "Request review" — meaning they
  # consider the work ready. A PR being opened or linked does NOT
  # trigger this (could be WIP/draft).
  review-requested:
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.action == 'review_requested'
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues to In Review
        run: |
          PR_BODY=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} --json body -q '.body')

          ISSUE_NUMS=$(echo "$PR_BODY" | \
            grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#[0-9]+' | \
            grep -oE '[0-9]+' || true)

          if [ -z "$ISSUE_NUMS" ]; then
            echo "No linked issues found in PR body"
            exit 0
          fi

          for NUM in $ISSUE_NUMS; do
            ITEM_DATA=$(gh project item-list $PROJECT_NUMBER \
              --owner $PROJECT_OWNER --limit 200 --format json | \
              jq -r --arg N "$NUM" \
              '.items[] | select(.content.number == ($N|tonumber)) | "\(.id) \(.status)"')

            ITEM_ID=$(echo "$ITEM_DATA" | awk '{print $1}')
            CURRENT_STATUS=$(echo "$ITEM_DATA" | awk '{$1=""; print $0}' | xargs)

            if [ -z "$ITEM_ID" ] || [ "$ITEM_ID" = "null" ]; then
              echo "Issue #$NUM not in project, skipping"
              continue
            fi

            # Only move forward — don't override Done or Invalid
            if [ "$CURRENT_STATUS" = "Done" ] || [ "$CURRENT_STATUS" = "Invalid" ]; then
              echo "Issue #$NUM is $CURRENT_STATUS, skipping"
              continue
            fi

            gh api graphql -f query="
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: \"$PROJECT_ID\"
                  itemId: \"$ITEM_ID\"
                  fieldId: \"$STATUS_FIELD_ID\"
                  value: { singleSelectOptionId: \"$STATUS_IN_REVIEW\" }
                }) { projectV2Item { id } }
              }"
            echo "Moved #$NUM to In Review (was: $CURRENT_STATUS)"
          done

  # ─── Changes requested on review → linked issues to In Progress ─
  # Built-in "Code changes requested" operates on the PR item, but
  # PRs aren't on the board. This handles the linked issue instead.
  changes-requested:
    if: >-
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'changes_requested'
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues to In Progress
        run: |
          PR_BODY=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} --json body -q '.body')

          ISSUE_NUMS=$(echo "$PR_BODY" | \
            grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#[0-9]+' | \
            grep -oE '[0-9]+' || true)

          if [ -z "$ISSUE_NUMS" ]; then
            echo "No linked issues found in PR body"
            exit 0
          fi

          for NUM in $ISSUE_NUMS; do
            ITEM_DATA=$(gh project item-list $PROJECT_NUMBER \
              --owner $PROJECT_OWNER --limit 200 --format json | \
              jq -r --arg N "$NUM" \
              '.items[] | select(.content.number == ($N|tonumber)) | "\(.id) \(.status)"')

            ITEM_ID=$(echo "$ITEM_DATA" | awk '{print $1}')
            CURRENT_STATUS=$(echo "$ITEM_DATA" | awk '{$1=""; print $0}' | xargs)

            if [ -z "$ITEM_ID" ] || [ "$ITEM_ID" = "null" ]; then
              echo "Issue #$NUM not in project, skipping"
              continue
            fi

            # Only move from In Review back to In Progress
            if [ "$CURRENT_STATUS" != "In Review" ]; then
              echo "Issue #$NUM is $CURRENT_STATUS (not In Review), skipping"
              continue
            fi

            gh api graphql -f query="
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: \"$PROJECT_ID\"
                  itemId: \"$ITEM_ID\"
                  fieldId: \"$STATUS_FIELD_ID\"
                  value: { singleSelectOptionId: \"$STATUS_IN_PROGRESS\" }
                }) { projectV2Item { id } }
              }"
            echo "Moved #$NUM to In Progress (changes requested)"
          done

  # ─── PR closed without merge → In Progress or Todo ────────────
  # Checks for OTHER open PRs linked to the same issue first.
  # If another PR is still open, the issue stays In Review.
  # Otherwise: In Progress if assigned, Todo if not.
  pr-closed-not-merged:
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == false
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues based on remaining PRs and assignment
        run: |
          PR_BODY=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} --json body -q '.body')

          ISSUE_NUMS=$(echo "$PR_BODY" | \
            grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#[0-9]+' | \
            grep -oE '[0-9]+' || true)

          if [ -z "$ISSUE_NUMS" ]; then
            echo "No linked issues found in PR body"
            exit 0
          fi

          CLOSED_PR=${{ github.event.pull_request.number }}

          for NUM in $ISSUE_NUMS; do
            # Check current status — don't touch Done or Invalid issues
            ITEM_DATA=$(gh project item-list $PROJECT_NUMBER \
              --owner $PROJECT_OWNER --limit 200 --format json | \
              jq -r --arg N "$NUM" \
              '.items[] | select(.content.number == ($N|tonumber)) | "\(.id) \(.status)"')

            ITEM_ID=$(echo "$ITEM_DATA" | awk '{print $1}')
            CURRENT_STATUS=$(echo "$ITEM_DATA" | awk '{$1=""; print $0}' | xargs)

            if [ -z "$ITEM_ID" ] || [ "$ITEM_ID" = "null" ]; then
              echo "Issue #$NUM not in project, skipping"
              continue
            fi

            if [ "$CURRENT_STATUS" = "Done" ] || [ "$CURRENT_STATUS" = "Invalid" ]; then
              echo "Issue #$NUM is $CURRENT_STATUS, skipping"
              continue
            fi

            # Check if there are OTHER open PRs linking to this issue
            # (competing approaches from different contributors)
            OTHER_PRS=$(gh pr list --repo ${{ github.repository }} \
              --state open --json number,body -q \
              "[.[] | select(.number != $CLOSED_PR) | select(.body | test(\"(?i)(close[sd]?|fix(e[sd])?|resolve[sd]?)\\\\s+#$NUM\"))] | length")

            if [ "$OTHER_PRS" -gt 0 ] 2>/dev/null; then
              echo "Issue #$NUM has $OTHER_PRS other open PR(s), staying In Review"
              continue
            fi

            # No other PRs — decide based on assignment
            ASSIGNEE_COUNT=$(gh issue view "$NUM" \
              --repo ${{ github.repository }} --json assignees -q '.assignees | length')

            if [ "$ASSIGNEE_COUNT" -gt 0 ]; then
              TARGET="$STATUS_IN_PROGRESS"
              TARGET_NAME="In Progress"
            else
              TARGET="$STATUS_TODO"
              TARGET_NAME="Todo"
            fi

            gh api graphql -f query="
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: \"$PROJECT_ID\"
                  itemId: \"$ITEM_ID\"
                  fieldId: \"$STATUS_FIELD_ID\"
                  value: { singleSelectOptionId: \"$TARGET\" }
                }) { projectV2Item { id } }
              }"
            echo "Moved #$NUM to $TARGET_NAME (PR #$CLOSED_PR closed, assignees: $ASSIGNEE_COUNT, other PRs: 0)"
          done
